
# Frontend CI for target repo - runs install, lint, build and unit tests
name: Frontend CI

env:
  NODE_VERSION: '20.9.0'
  PACKAGE_JSON_FILE: package.json

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: frontend:lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: ${{ env.PACKAGE_JSON_FILE }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install deps (lint job)
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint || true

  build:
    name: frontend:build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: ${{ env.PACKAGE_JSON_FILE }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install deps (build job)
        run: pnpm install --frozen-lockfile

      - name: Run build
        run: pnpm build

  unit-tests:
    name: frontend:unit-tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: ${{ env.PACKAGE_JSON_FILE }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install deps (test job)
        run: pnpm install --frozen-lockfile

      - name: Detect test script
        id: has-tests
        shell: bash
        run: |
          if node -e "const pkg=require('./${{ env.PACKAGE_JSON_FILE }}'); process.exit(pkg.scripts && pkg.scripts.test ? 0 : 1)"; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run unit tests
        if: steps.has-tests.outputs.present == 'true'
        run: pnpm test -- --ci

      - name: Skip unit tests
        if: steps.has-tests.outputs.present != 'true'
        run: |
          echo "::warning title=Tests skipped::No test script defined in ./${{ env.PACKAGE_JSON_FILE }}; unit tests were skipped."
          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          ## Tests skipped
          - ⚠️ No `test` script found in `./${{ env.PACKAGE_JSON_FILE }}`.
          - CI remained green for the unit-test job, but no frontend unit tests were executed in this run.
          - Recommendation: add a real `test` script to restore test coverage gating.
          EOF

